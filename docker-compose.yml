# Local development dependencies. Used from Phase 3 onward.
# Run with:  docker compose up -d
# Stop with: docker compose down
#
# Phase 0: nothing here is needed yet — the file is a placeholder so the
# eventual stack is obvious from day one.

services:

  # Postgres with PostGIS extension — used in Phase 3 for saved routes,
  # spatial queries, and persistence in general.
  postgres:
    image: postgis/postgis:17-3.5
    container_name: routeforge-postgres
    environment:
      POSTGRES_DB: routeforge
      POSTGRES_USER: routeforge
      POSTGRES_PASSWORD: routeforge   # local-only, do NOT commit real secrets
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles: ["db"]   # opt-in: `docker compose --profile db up`

  # Redis — used in Phase 3 as a cache for recent route lookups.
  redis:
    image: redis:7-alpine
    container_name: routeforge-redis
    ports:
      - "6379:6379"
    profiles: ["cache"]

volumes:
  postgres-data:
